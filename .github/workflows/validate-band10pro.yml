name: Validate Band 10 Pro P67 source

on:
  push:
    paths:
      - 'README.md'
      - 'source/README.md'
      - 'source/miband10pro/**'
      - 'source/app.json'
      - 'source/app.bin'
      - '.github/workflows/validate-band10pro.yml'
  pull_request:
    paths:
      - 'README.md'
      - 'source/README.md'
      - 'source/miband10pro/**'
      - 'source/app.json'
      - 'source/app.bin'
      - '.github/workflows